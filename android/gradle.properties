org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# --- SSL / PKIX (Gradle : « unable to find valid certification path ») ---
# Cause fréquente : proxy d’entreprise, Zscaler, antivirus qui intercepte HTTPS.
# Décommente UNE option ci-dessous si les dépendances Maven/Google ne se téléchargent pas.
#
# 1) Utiliser le JDK embarqué d’Android Studio (magasin de certs souvent à jour) :
# org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr
#
# 2) Faire confiance au magasin Windows (test local ; à retirer si effet de bord) :
# systemProp.javax.net.ssl.trustStore=NUL
# systemProp.javax.net.ssl.trustStoreType=Windows-ROOT
#
# 3) Sinon : importer la CA racine de l’entreprise dans le cacerts du JDK utilisé par Gradle
#    (keytool -importcert … vers %JAVA_HOME%\\lib\\security\\cacerts).
